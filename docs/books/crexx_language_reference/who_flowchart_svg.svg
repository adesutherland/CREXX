<svg width="500" height="250" xmlns="http://www.w3.org/2000/svg">
  <!-- Decision diamond -->
  <polygon points="250,80 290,110 250,140 210,110" fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="108" text-anchor="middle" font-family="Arial" font-size="10" fill="black">WHO =</text>
  <text x="250" y="120" text-anchor="middle" font-family="Arial" font-size="10" fill="black">""</text>
  
  <!-- True branch action box (to the left) -->
  <rect x="70" y="95" width="100" height="30" fill="white" stroke="black" stroke-width="2"/>
  <text x="120" y="115" text-anchor="middle" font-family="Arial" font-size="10" fill="black">SAY "hello, stranger!"</text>
  
  <!-- False branch action box (to the right) -->
  <rect x="350" y="95" width="80" height="30" fill="white" stroke="black" stroke-width="2"/>
  <text x="390" y="108" text-anchor="middle" font-family="Arial" font-size="9" fill="black">SAY "Hello"</text>
  <text x="390" y="122" text-anchor="middle" font-family="Arial" font-size="9" fill="black">WHO</text>
  
  <!-- Arrows -->
  <!-- Decision to true branch (left with 90° angles) -->
  <line x1="210" y1="110" x2="190" y2="110" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="190" y1="110" x2="170" y2="110" stroke="black" stroke-width="2"/>
  
  <!-- Decision to false branch (right with 90° angles) -->
  <line x1="290" y1="110" x2="310" y2="110" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="310" y1="110" x2="350" y2="110" stroke="black" stroke-width="2"/>
  
  <!-- Both branches continue down to convergence -->
  <line x1="120" y1="125" x2="120" y2="180" stroke="black" stroke-width="2"/>
  <line x1="120" y1="180" x2="250" y2="180" stroke="black" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <line x1="390" y1="125" x2="390" y2="180" stroke="black" stroke-width="2"/>
  <line x1="390" y1="180" x2="250" y2="180" stroke="black" stroke-width="2" marker-end="url(#leftarrowhead)"/>
  
  <!-- Labels for branches -->
  <text x="180" y="105" font-family="Arial" font-size="10" fill="black">true</text>
  <text x="320" y="105" font-family="Arial" font-size="10" fill="black">false</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
    <marker id="leftarrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>
</svg>