name: Build CREXX

on:
  push:
    branches:
      - develop
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            platform: linux
            cmake_args: ""
          - name: Windows x64
            os: windows-latest
            platform: windows
            cmake_args: "-DCREXX_FORCE_SYSTEM_OPENSSL=ON"
          - name: macOS arm64
            os: macos-latest
            platform: macos
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=arm64"
          - name: macOS x86_64
            os: macos-15-intel
            platform: macos
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update toolchain (MSYS2)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            base-devel
            git
            make
          pacboy: >-
            toolchain:p
            cmake:p
            ninja:p
            openssl:p
            pkgconf:p

      - name: Configure
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cmake -S . -B "${{ runner.temp }}/build" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            ${{ matrix.cmake_args }}

      - name: Configure
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cmake -S . -G Ninja -B "${{ runner.temp }}/build" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            ${{ matrix.cmake_args }}

      - name: Build
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cmake --build "${{ runner.temp }}/build" --parallel 2

      - name: Build
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cmake --build "${{ runner.temp }}/build" --parallel 2

      - name: CTest
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          ctest --test-dir "${{ runner.temp }}/build" \
            --output-on-failure \
            --no-tests=error \
            --parallel 1

      - name: CTest
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          ctest --test-dir "${{ runner.temp }}/build" \
            --output-on-failure \
            --no-tests=error \
            --parallel 1
