name: Build CREXX

on:
  push:
    branches:
      - develop
      - master
  create:
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    name: Determine Version Metadata
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      channel: ${{ steps.metadata.outputs.channel }}
      timestamp: ${{ steps.metadata.outputs.timestamp }}
      commit: ${{ steps.metadata.outputs.commit }}
      display_version: ${{ steps.metadata.outputs.display_version }}
      release_name: ${{ steps.metadata.outputs.release_name }}

    steps:
      - name: Checkout version file
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Determine metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          version_file="$(tr -d '[:space:]' < VERSION)"
          version="$version_file"
          channel="local"
          timestamp="$(date -u +'%Y%m%dT%H%M%SZ')"
          short_sha="${GITHUB_SHA:0:12}"
          release_name="CREXX Local Build ${timestamp}"

          if [ "${GITHUB_EVENT_NAME}" = "create" ] && [[ "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            channel="release"
            release_name="CREXX ${version}"

            if [ "$version" != "$version_file" ]; then
              echo "Release tag ${GITHUB_REF_NAME} does not match VERSION file ${version_file}" >&2
              exit 1
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/develop" ]; then
            channel="dev-snapshot"
            release_name="CREXX Dev Snapshot ${timestamp}"
          fi

          version_without_build="${version%%+*}"
          version_build_metadata=""
          if [[ "$version" == *+* ]]; then
            version_build_metadata="${version#*+}"
          fi

          if [ "$channel" = "release" ]; then
            display_version="crexx-${version}"
          elif [ -n "$version_build_metadata" ]; then
            display_version="crexx-${version_without_build}+${version_build_metadata}.${channel}.g${short_sha}"
          else
            display_version="crexx-${version_without_build}+${channel}.g${short_sha}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${timestamp}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "display_version=${display_version}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.name }}
    needs: version
    if: github.event_name != 'create' || (github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v'))
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            platform: linux
            artifact_name: CREXX-linux-x64
            cmake_args: ""
          - name: Windows x64
            os: windows-2025
            platform: windows
            artifact_name: CREXX-windows-x64
            cmake_args: "-DCREXX_FORCE_SYSTEM_OPENSSL=ON"
          - name: macOS arm64
            os: macos-15
            platform: macos
            artifact_name: CREXX-macos-arm64
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=arm64"
          - name: macOS x86_64
            os: macos-15-intel
            platform: macos
            artifact_name: CREXX-macos-x86_64
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Update toolchain (MSYS2)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            base-devel
            git
          pacboy: >-
            toolchain:p
            cmake:p
            ninja:p
            openssl:p
            pkgconf:p

      - name: Configure
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cmake -S . -G Ninja -B "${{ runner.temp }}/build" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCREXX_VERSION_OVERRIDE="${{ needs.version.outputs.version }}" \
            -DCREXX_BUILD_CHANNEL="${{ needs.version.outputs.channel }}" \
            -DCREXX_BUILD_TIMESTAMP="${{ needs.version.outputs.timestamp }}" \
            -DCREXX_BUILD_COMMIT="${{ needs.version.outputs.commit }}" \
            ${{ matrix.cmake_args }}

      - name: Configure
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cmake -S . -G Ninja -B "${{ runner.temp }}/build" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCREXX_VERSION_OVERRIDE="${{ needs.version.outputs.version }}" \
            -DCREXX_BUILD_CHANNEL="${{ needs.version.outputs.channel }}" \
            -DCREXX_BUILD_TIMESTAMP="${{ needs.version.outputs.timestamp }}" \
            -DCREXX_BUILD_COMMIT="${{ needs.version.outputs.commit }}" \
            ${{ matrix.cmake_args }}

      - name: Build
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cmake --build "${{ runner.temp }}/build" --parallel 2

      - name: Build
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cmake --build "${{ runner.temp }}/build" --parallel 2

      - name: CTest
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          ctest --test-dir "${{ runner.temp }}/build" \
            --output-on-failure \
            --no-tests=error \
            --parallel 1

      - name: CTest
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          ctest --test-dir "${{ runner.temp }}/build" \
            --output-on-failure \
            --no-tests=error \
            --parallel 1

      - name: Stage release payload
        if: (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail

          stage="${{ runner.temp }}/release-payload/${{ matrix.artifact_name }}"
          mkdir -p "$stage/bin" "$stage/examples"

          cp "${{ runner.temp }}/build/bin/"* "$stage/bin/"
          cp examples/* "$stage/examples/"
          cp LICENSE README.md SECURITY.md INSTALL-RUN.md "$stage/"
          cp "${{ runner.temp }}/build/generated/VERSION" "$stage/VERSION"
          cp "${{ runner.temp }}/build/generated/BUILDINFO" "$stage/BUILDINFO"

      - name: Stage release payload
        if: (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform == 'windows'
        shell: pwsh
        run: |
          $stage = Join-Path "${{ runner.temp }}" "release-payload/${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force -Path (Join-Path $stage "bin") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $stage "examples") | Out-Null

          Copy-Item -Path (Join-Path "${{ runner.temp }}" "build/bin/*") -Destination (Join-Path $stage "bin") -Recurse
          Copy-Item -Path "examples/*" -Destination (Join-Path $stage "examples") -Recurse
          Copy-Item -Path "LICENSE", "README.md", "SECURITY.md", "INSTALL-RUN.md" -Destination $stage
          Copy-Item -Path (Join-Path "${{ runner.temp }}" "build/generated/VERSION") -Destination (Join-Path $stage "VERSION") -Force
          Copy-Item -Path (Join-Path "${{ runner.temp }}" "build/generated/BUILDINFO") -Destination (Join-Path $stage "BUILDINFO") -Force

      - name: Configure Apple signing keychain
        id: macos_signing
        if: (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}
          APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_DEVELOPER_ID_INSTALLER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_IDENTITY }}
        run: |
          set -euo pipefail

          missing=()
          if [ -z "${APPLE_DEVELOPER_ID_CERTIFICATE_BASE64:-}" ]; then
            missing+=(APPLE_DEVELOPER_ID_CERTIFICATE_BASE64)
          fi
          if [ -z "${APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD:-}" ]; then
            missing+=(APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD)
          fi
          if [ -z "${APPLE_DEVELOPER_ID_IDENTITY:-}" ]; then
            missing+=(APPLE_DEVELOPER_ID_IDENTITY)
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "pkg_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping macOS code signing because Apple Developer ID Application secrets are not configured: ${missing[*]}"
            {
              echo "### macOS signing skipped"
              echo
              echo "Apple Developer ID Application secrets are not configured for this repository or fork:"
              printf -- "- \`%s\`\n" "${missing[@]}"
              echo
              echo "The workflow will continue and upload unsigned macOS ZIP assets. No macOS .pkg asset is produced by this workflow yet."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          application_certificate_path="${RUNNER_TEMP}/developer-id-application.p12"
          installer_certificate_path="${RUNNER_TEMP}/developer-id-installer.p12"
          keychain_path="${RUNNER_TEMP}/crexx-signing.keychain-db"
          keychain_password="$(uuidgen)"

          summarize_p12_certificate() {
            local label="$1"
            local certificate_path="$2"
            local certificate_password="$3"

            echo "${label} public certificate metadata:"
            if ! P12_PASSWORD="$certificate_password" openssl pkcs12 \
              -in "$certificate_path" \
              -passin env:P12_PASSWORD \
              -clcerts \
              -nokeys 2>/dev/null | openssl x509 -noout -subject -issuer -serial -fingerprint -sha256; then
              echo "::warning::Could not read ${label} public certificate metadata from the .p12 file."
            fi
          }

          detect_installer_identity() {
            local keychain="$1"
            security find-identity -v -p basic "$keychain" |
              awk -F\" '/Developer ID Installer:/ { print $2; exit }' ||
              true
          }

          normalize_identity() {
            local value="$1"
            value="${value//$'\r'/}"
            value="${value//$'\n'/}"
            value="$(printf '%s' "$value" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            if [[ "$value" == \"*\" && "$value" == *\" && ${#value} -ge 2 ]]; then
              value="${value:1:${#value}-2}"
              value="$(printf '%s' "$value" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            fi
            printf '%s' "$value"
          }

          printf '%s' "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 -D > "$application_certificate_path"
          summarize_p12_certificate "Developer ID Application" \
            "$application_certificate_path" \
            "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$application_certificate_path" \
            -k "$keychain_path" \
            -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          installer_missing=()
          if [ -z "${APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64:-}" ]; then
            installer_missing+=(APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64)
          fi
          if [ -z "${APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD:-}" ]; then
            installer_missing+=(APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD)
          fi

          if [ "${#installer_missing[@]}" -eq 0 ]; then
            printf '%s' "$APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64" | base64 -D > "$installer_certificate_path"
            summarize_p12_certificate "Developer ID Installer" \
              "$installer_certificate_path" \
              "$APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD"
            security import "$installer_certificate_path" \
              -k "$keychain_path" \
              -P "$APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD" \
              -T /usr/bin/pkgbuild \
              -T /usr/bin/productbuild \
              -T /usr/bin/productsign
            echo "pkg_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "pkg_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping macOS .pkg packaging because Apple Developer ID Installer secrets are not configured: ${installer_missing[*]}"
            {
              echo "### macOS .pkg packaging skipped"
              echo
              echo "Apple Developer ID Installer secrets are not configured for this repository or fork:"
              printf -- "- \`%s\`\n" "${installer_missing[@]}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$keychain_password" "$keychain_path"

          echo "Valid basic identities in Apple signing keychain:"
          security find-identity -v -p basic "$keychain_path" || true
          echo "Valid code-signing identities in Apple signing keychain:"
          security find-identity -v -p codesigning "$keychain_path" || true

          if [ "${#installer_missing[@]}" -eq 0 ]; then
            installer_identity="$(detect_installer_identity "$keychain_path")"
            if [ -z "$installer_identity" ]; then
              echo "::error::No Developer ID Installer identity was found in the imported Installer .p12. Check APPLE_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64 contains the Developer ID Installer .p12, not the Developer ID Application .p12 or a .cer file."
              exit 1
            fi

            if [ -n "${APPLE_DEVELOPER_ID_INSTALLER_IDENTITY:-}" ]; then
              configured_installer_identity="$(normalize_identity "$APPLE_DEVELOPER_ID_INSTALLER_IDENTITY")"
              if [ "$configured_installer_identity" != "$APPLE_DEVELOPER_ID_INSTALLER_IDENTITY" ]; then
                echo "::warning::APPLE_DEVELOPER_ID_INSTALLER_IDENTITY contains surrounding quotes or whitespace; the workflow is using the imported certificate Common Name instead."
              fi
              if [ "$configured_installer_identity" != "$installer_identity" ]; then
                echo "::warning::APPLE_DEVELOPER_ID_INSTALLER_IDENTITY does not match the imported Developer ID Installer certificate Common Name; the workflow is using the imported certificate Common Name instead."
              fi
            fi

            {
              echo "APPLE_DEVELOPER_ID_INSTALLER_IDENTITY_DETECTED<<__CREXX_INSTALLER_IDENTITY__"
              printf '%s\n' "$installer_identity"
              echo "__CREXX_INSTALLER_IDENTITY__"
            } >> "$GITHUB_ENV"
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "APPLE_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Sign macOS release payload
        if: (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform == 'macos' && steps.macos_signing.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}
        run: |
          set -euo pipefail

          if [ -z "${APPLE_DEVELOPER_ID_IDENTITY:-}" ]; then
            echo "APPLE_DEVELOPER_ID_IDENTITY is not set" >&2
            exit 1
          fi

          stage="${{ runner.temp }}/release-payload/${{ matrix.artifact_name }}"
          entitlements="${GITHUB_WORKSPACE}/.github/signing/macos-plugin-host.entitlements"
          signed_count=0

          while IFS= read -r -d '' file_path; do
            if ! file "$file_path" | grep -q 'Mach-O'; then
              continue
            fi

            file_name="$(basename "$file_path")"
            sign_args=(--force --timestamp --options runtime --sign "$APPLE_DEVELOPER_ID_IDENTITY")

            case "$file_name" in
              crexx|rxc|rxvm|rxvme|rxbvm|rxbvme|rxpp|rxdb)
                sign_args+=(--entitlements "$entitlements")
                ;;
            esac

            echo "Signing $file_path"
            codesign "${sign_args[@]}" "$file_path"
            signed_count=$((signed_count + 1))
          done < <(find "$stage" -type f -print0)

          if [ "$signed_count" -eq 0 ]; then
            echo "No Mach-O files were found to sign" >&2
            exit 1
          fi

          echo "Signed $signed_count Mach-O files"

      - name: Verify macOS signatures
        if: (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform == 'macos' && steps.macos_signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          stage="${{ runner.temp }}/release-payload/${{ matrix.artifact_name }}"

          while IFS= read -r -d '' file_path; do
            if file "$file_path" | grep -q 'Mach-O'; then
              codesign --verify --strict --verbose=2 "$file_path"
            fi
          done < <(find "$stage" -type f -print0)

      - name: Package release asset
        if: (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/develop" ]; then
            package_id="dev-snapshot"
          else
            package_id="${GITHUB_REF_NAME}"
          fi

          payload_root="${{ runner.temp }}/release-payload"
          payload="${{ matrix.artifact_name }}"
          suffix="${payload#CREXX-}"
          asset_dir="${{ runner.temp }}/release-assets"
          asset="CREXX-${package_id}-${suffix}.zip"

          mkdir -p "$asset_dir"
          if [ "${{ matrix.platform }}" = "macos" ]; then
            (cd "$payload_root" && ditto -c -k --norsrc --keepParent "$payload" "$asset_dir/$asset")
          else
            (cd "$payload_root" && zip -qr "$asset_dir/$asset" "$payload")
          fi
          echo "CREXX_RELEASE_ASSET=$asset_dir/$asset" >> "$GITHUB_ENV"

      - name: Package macOS installer
        if: (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform == 'macos' && steps.macos_signing.outputs.pkg_enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${APPLE_DEVELOPER_ID_INSTALLER_IDENTITY_DETECTED:-}" ]; then
            echo "APPLE_DEVELOPER_ID_INSTALLER_IDENTITY_DETECTED is not set" >&2
            exit 1
          fi
          if [ -z "${APPLE_SIGNING_KEYCHAIN:-}" ]; then
            echo "APPLE_SIGNING_KEYCHAIN is not set" >&2
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/develop" ]; then
            package_id="dev-snapshot"
          else
            package_id="${GITHUB_REF_NAME}"
          fi

          payload="${{ matrix.artifact_name }}"
          suffix="${payload#CREXX-}"
          pkg_asset_dir="${{ runner.temp }}/macos-pkg-assets"
          pkg_asset="$pkg_asset_dir/CREXX-${package_id}-${suffix}.pkg"

          scripts/package-macos-pkg.sh \
            --payload-dir "${{ runner.temp }}/release-payload/${{ matrix.artifact_name }}" \
            --output "$pkg_asset" \
            --package-version "${{ needs.version.outputs.display_version }}" \
            --sign-identity "$APPLE_DEVELOPER_ID_INSTALLER_IDENTITY_DETECTED" \
            --keychain "$APPLE_SIGNING_KEYCHAIN"

          pkgutil --check-signature "$pkg_asset"
          echo "CREXX_MACOS_PKG_ASSET=$pkg_asset" >> "$GITHUB_ENV"

      - name: Package Linux Debian dev snapshot
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop' && matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          asset_dir="${{ runner.temp }}/release-assets"
          scripts/package-linux-deb.sh \
            --payload-dir "${{ runner.temp }}/release-payload/${{ matrix.artifact_name }}" \
            --output "$asset_dir/CREXX-dev-snapshot-linux-x64.deb" \
            --display-version "${{ needs.version.outputs.display_version }}"

      - name: Package release asset
        if: (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform == 'windows'
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "push" -and $env:GITHUB_REF -eq "refs/heads/develop") {
            $packageId = "dev-snapshot"
          } else {
            $packageId = $env:GITHUB_REF_NAME
          }

          $payloadRoot = Join-Path "${{ runner.temp }}" "release-payload"
          $payload = "${{ matrix.artifact_name }}"
          $suffix = $payload -replace "^CREXX-", ""
          $assetDir = Join-Path "${{ runner.temp }}" "release-assets"
          $asset = "CREXX-$packageId-$suffix.zip"
          $assetPath = Join-Path $assetDir $asset

          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          Compress-Archive -Path (Join-Path $payloadRoot $payload) -DestinationPath $assetPath -Force
          "CREXX_RELEASE_ASSET=$assetPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Report macOS package status
        if: (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "### macOS package status"
            echo
            echo "This workflow publishes the macOS ZIP asset as a portable archive."
            if [ "${{ steps.macos_signing.outputs.pkg_enabled }}" = "true" ]; then
              echo "A signed .pkg installer was built and will be uploaded after notarization and stapling succeed."
            else
              echo "No macOS .pkg asset is produced because Developer ID Installer signing is not configured."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notarize macOS ZIP asset
        if: (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform == 'macos' && steps.macos_signing.outputs.enabled == 'true'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          missing=()
          if [ -z "${APPLE_ID:-}" ]; then
            missing+=(APPLE_ID)
          fi
          if [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]; then
            missing+=(APPLE_APP_SPECIFIC_PASSWORD)
          fi
          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            missing+=(APPLE_TEAM_ID)
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Skipping macOS notarization because Apple notarization secrets are not configured: ${missing[*]}"
            {
              echo "### macOS notarization skipped"
              echo
              echo "The macOS ZIP payload was signed, but notarization secrets are not configured:"
              printf -- "- \`%s\`\n" "${missing[@]}"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          xcrun notarytool submit "$CREXX_RELEASE_ASSET" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Notarize and staple macOS installer
        if: (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform == 'macos' && steps.macos_signing.outputs.pkg_enabled == 'true'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          missing=()
          if [ -z "${APPLE_ID:-}" ]; then
            missing+=(APPLE_ID)
          fi
          if [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]; then
            missing+=(APPLE_APP_SPECIFIC_PASSWORD)
          fi
          if [ -z "${APPLE_TEAM_ID:-}" ]; then
            missing+=(APPLE_TEAM_ID)
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Skipping macOS .pkg notarization because Apple notarization secrets are not configured: ${missing[*]}"
            {
              echo "### macOS .pkg notarization skipped"
              echo
              echo "The macOS .pkg was signed, but it will not be uploaded because notarization secrets are not configured:"
              printf -- "- \`%s\`\n" "${missing[@]}"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ -z "${CREXX_MACOS_PKG_ASSET:-}" ]; then
            echo "CREXX_MACOS_PKG_ASSET is not set" >&2
            exit 1
          fi

          xcrun notarytool submit "$CREXX_MACOS_PKG_ASSET" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$CREXX_MACOS_PKG_ASSET"
          xcrun stapler validate "$CREXX_MACOS_PKG_ASSET"
          spctl --assess --type install --verbose=4 "$CREXX_MACOS_PKG_ASSET"

          mkdir -p "${{ runner.temp }}/release-assets"
          cp "$CREXX_MACOS_PKG_ASSET" "${{ runner.temp }}/release-assets/"

      - name: Upload packaged asset
        if: github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-release-asset
          path: ${{ runner.temp }}/release-assets/CREXX-*
          if-no-files-found: error

      - name: Cleanup Apple signing keychain
        if: always() && (github.event_name == 'create' || (github.event_name == 'push' && github.ref == 'refs/heads/develop')) && matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${APPLE_SIGNING_KEYCHAIN:-}" ]; then
            security delete-keychain "$APPLE_SIGNING_KEYCHAIN" || true
          fi

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - build
      - version
    if: github.event_name == 'create' && github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v')
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout release notes
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/downloaded-release-assets

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail

          download_dir="${{ runner.temp }}/downloaded-release-assets"
          asset_dir="${{ runner.temp }}/release-assets"
          mkdir -p "$asset_dir"

          find "$download_dir" \
            \( -name 'CREXX-*.zip' -o -name 'CREXX-*.pkg' \) \
            -type f -exec cp {} "$asset_dir/" \;

          zip_count="$(find "$asset_dir" -name 'CREXX-*.zip' -type f | wc -l | tr -d ' ')"
          if [ "$zip_count" != "4" ]; then
            echo "Expected 4 release ZIP assets, found $zip_count" >&2
            exit 1
          fi

          pkg_count="$(find "$asset_dir" -name 'CREXX-*.pkg' -type f | wc -l | tr -d ' ')"
          if [ "$pkg_count" != "0" ] && [ "$pkg_count" != "2" ]; then
            echo "Expected 0 or 2 release PKG assets, found $pkg_count" >&2
            exit 1
          fi

          ls -lh "$asset_dir"

      - name: Determine release metadata
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          echo "RELEASE_NAME=${{ needs.version.outputs.release_name }}" >> "$GITHUB_ENV"

          case "$tag" in
            *alpha*|*beta*|*rc*|*test*)
              echo "PRERELEASE=true" >> "$GITHUB_ENV"
              ;;
            *)
              echo "PRERELEASE=false" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          notes_file="docs/releases/${tag}.md"
          release_notes="${RUNNER_TEMP}/release-notes.md"

          if [ -f "$notes_file" ]; then
            cp "$notes_file" "$release_notes"
          else
            {
              echo "# CREXX ${tag#v}"
              echo
              echo "Automated release for ${tag}."
              echo
              echo "No curated release notes file was found at \`${notes_file}\`."
            } > "$release_notes"
          fi

          echo "RELEASE_NOTES_PATH=$release_notes" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ env.PRERELEASE }}
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          fail_on_unmatched_files: true
          files: ${{ runner.temp }}/release-assets/CREXX-*

  dev-snapshot:
    name: Publish Dev Snapshot
    runs-on: ubuntu-24.04
    needs:
      - build
      - version
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    timeout-minutes: 15
    permissions:
      contents: write
    concurrency:
      group: crexx-dev-snapshot
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Verify develop still points at this commit
        id: publish_target
        shell: bash
        run: |
          set -euo pipefail

          latest_develop_sha="$(git ls-remote origin refs/heads/develop | awk '{print $1}')"
          if [ "$latest_develop_sha" != "$GITHUB_SHA" ]; then
            echo "develop now points at $latest_develop_sha; this run built $GITHUB_SHA."
            echo "Skipping dev snapshot publish so an older run cannot replace a newer build."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Download packaged assets
        if: steps.publish_target.outputs.should_publish == 'true'
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/downloaded-dev-snapshot-assets

      - name: Collect dev snapshot assets
        if: steps.publish_target.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail

          download_dir="${{ runner.temp }}/downloaded-dev-snapshot-assets"
          asset_dir="${{ runner.temp }}/dev-snapshot-assets"
          mkdir -p "$asset_dir"

          find "$download_dir" \
            \( -name 'CREXX-dev-snapshot-*.zip' -o -name 'CREXX-dev-snapshot-*.deb' -o -name 'CREXX-dev-snapshot-*.pkg' \) \
            -type f -exec cp {} "$asset_dir/" \;

          expected_assets=(
            CREXX-dev-snapshot-linux-x64.zip
            CREXX-dev-snapshot-linux-x64.deb
            CREXX-dev-snapshot-windows-x64.zip
            CREXX-dev-snapshot-macos-arm64.zip
            CREXX-dev-snapshot-macos-x86_64.zip
          )

          pkg_count="$(find "$asset_dir" -maxdepth 1 -name 'CREXX-dev-snapshot-macos-*.pkg' -type f | wc -l | tr -d ' ')"
          if [ "$pkg_count" = "2" ]; then
            expected_assets+=(
              CREXX-dev-snapshot-macos-arm64.pkg
              CREXX-dev-snapshot-macos-x86_64.pkg
            )
          elif [ "$pkg_count" != "0" ]; then
            echo "Expected 0 or 2 dev snapshot macOS PKG assets, found $pkg_count" >&2
            find "$asset_dir" -maxdepth 1 -type f -print >&2
            exit 1
          fi

          for asset in "${expected_assets[@]}"; do
            if [ ! -f "$asset_dir/$asset" ]; then
              echo "Missing dev snapshot asset: $asset" >&2
              find "$asset_dir" -maxdepth 1 -type f -print >&2
              exit 1
            fi
          done

          asset_count="$(find "$asset_dir" -maxdepth 1 -name 'CREXX-dev-snapshot-*' -type f | wc -l | tr -d ' ')"
          if [ "$asset_count" != "${#expected_assets[@]}" ]; then
            echo "Expected ${#expected_assets[@]} dev snapshot assets, found $asset_count" >&2
            find "$asset_dir" -maxdepth 1 -type f -print >&2
            exit 1
          fi

          ls -lh "$asset_dir"

      - name: Prepare dev snapshot notes
        if: steps.publish_target.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail

          notes_file="${RUNNER_TEMP}/dev-snapshot-notes.md"
          short_sha="${GITHUB_SHA:0:12}"

          {
            echo "# ${{ needs.version.outputs.release_name }}"
            echo
            echo "This is the latest successful build from the \`develop\` branch."
            echo "It is replaced by the next successful \`develop\` build and is not a versioned release."
            echo
            echo "- Version: \`${{ needs.version.outputs.display_version }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Built: \`${{ needs.version.outputs.timestamp }}\`"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "macOS .pkg assets, when present, are signed, notarized, stapled installers. macOS ZIP assets remain portable archives."
            echo "Windows signing and installer packaging are completed separately. Prefer \`CREXX-dev-snapshot-windows-x64-setup.exe\` for normal installation when it is present and matches commit \`${short_sha}\`; use \`CREXX-dev-snapshot-windows-x64-signed.zip\` as the portable archive."
          } > "$notes_file"

          echo "DEV_SNAPSHOT_NOTES_PATH=$notes_file" >> "$GITHUB_ENV"

      - name: Publish dev snapshot release
        if: steps.publish_target.outputs.should_publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAPSHOT_TAG: dev-snapshot
          SNAPSHOT_NAME: ${{ needs.version.outputs.release_name }}
        run: |
          set -euo pipefail

          asset_dir="${{ runner.temp }}/dev-snapshot-assets"
          upload_dir="${{ runner.temp }}/dev-snapshot-upload"
          mkdir -p "$upload_dir"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$SNAPSHOT_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/${SNAPSHOT_TAG}" --force

          if gh release view "$SNAPSHOT_TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$SNAPSHOT_TAG" \
              -R "$GITHUB_REPOSITORY" \
              --title "$SNAPSHOT_NAME" \
              --notes-file "$DEV_SNAPSHOT_NOTES_PATH" \
              --prerelease \
              --latest=false
          else
            gh release create "$SNAPSHOT_TAG" \
              -R "$GITHUB_REPOSITORY" \
              --title "$SNAPSHOT_NAME" \
              --notes-file "$DEV_SNAPSHOT_NOTES_PATH" \
              --prerelease \
              --latest=false \
              --verify-tag
          fi

          asset_api_path() {
            local name="$1"
            gh release view "$SNAPSHOT_TAG" \
              -R "$GITHUB_REPOSITORY" \
              --json assets \
              --jq ".assets[] | select(.name == \"$name\") | .apiUrl" |
              sed 's#^https://api.github.com/##'
          }

          delete_stale_temp_assets() {
            local temp_api_path
            while IFS= read -r temp_api_path; do
              [ -n "$temp_api_path" ] || continue
              gh api -X DELETE "$temp_api_path"
            done < <(
              gh release view "$SNAPSHOT_TAG" \
                -R "$GITHUB_REPOSITORY" \
                --json assets \
                --jq '.assets[] | select(.name | startswith("CREXX-dev-snapshot-") and (endswith(".tmp.zip") or endswith(".tmp.deb") or endswith(".tmp.pkg"))) | .apiUrl' |
                sed 's#^https://api.github.com/##'
            )
          }

          temp_asset_name() {
            local asset="$1"
            case "$asset" in
              *.zip)
                echo "${asset%.zip}-${GITHUB_RUN_ID}.tmp.zip"
                ;;
              *.deb)
                echo "${asset%.deb}-${GITHUB_RUN_ID}.tmp.deb"
                ;;
              *.pkg)
                echo "${asset%.pkg}-${GITHUB_RUN_ID}.tmp.pkg"
                ;;
              *)
                echo "${asset}-${GITHUB_RUN_ID}.tmp"
                ;;
            esac
          }

          mapfile -t expected_assets < <(
            find "$asset_dir" -maxdepth 1 -name 'CREXX-dev-snapshot-*' -type f -exec basename {} \; |
              sort
          )
          if [ "${#expected_assets[@]}" -eq 0 ]; then
            echo "No dev snapshot assets collected for upload" >&2
            exit 1
          fi

          asset_is_expected() {
            local needle="$1"
            local expected
            for expected in "${expected_assets[@]}"; do
              if [ "$expected" = "$needle" ]; then
                return 0
              fi
            done
            return 1
          }

          delete_stale_temp_assets

          for asset in "${expected_assets[@]}"; do
            temp_asset="$(temp_asset_name "$asset")"
            cp "$asset_dir/$asset" "$upload_dir/$temp_asset"
          done

          gh release upload "$SNAPSHOT_TAG" "$upload_dir"/* \
            -R "$GITHUB_REPOSITORY" \
            --clobber

          for asset in "${expected_assets[@]}"; do
            temp_asset="$(temp_asset_name "$asset")"
            temp_api_path="$(asset_api_path "$temp_asset")"
            if [ -z "$temp_api_path" ]; then
              echo "Uploaded temporary asset is not visible: $temp_asset" >&2
              exit 1
            fi

            current_api_path="$(asset_api_path "$asset" || true)"
            if [ -n "$current_api_path" ]; then
              gh api -X DELETE "$current_api_path"
            fi

            gh api -X PATCH "$temp_api_path" -f name="$asset"
          done

          signed_asset_api_path="$(asset_api_path "CREXX-dev-snapshot-windows-x64-signed.zip" || true)"
          if [ -n "$signed_asset_api_path" ]; then
            gh api -X DELETE "$signed_asset_api_path"
          fi

          for stale_optional_asset in \
            CREXX-dev-snapshot-macos-arm64.pkg \
            CREXX-dev-snapshot-macos-x86_64.pkg; do
            if ! asset_is_expected "$stale_optional_asset"; then
              stale_optional_api_path="$(asset_api_path "$stale_optional_asset" || true)"
              if [ -n "$stale_optional_api_path" ]; then
                gh api -X DELETE "$stale_optional_api_path"
              fi
            fi
          done

          for asset in "${expected_assets[@]}"; do
            final_api_path="$(asset_api_path "$asset")"
            if [ -z "$final_api_path" ]; then
              echo "Final dev snapshot asset is not visible: $asset" >&2
              exit 1
            fi
          done

          delete_stale_temp_assets

          gh release view "$SNAPSHOT_TAG" -R "$GITHUB_REPOSITORY"
