name: Build CREXX

on:
  push:
    branches:
      - develop
      - master
  create:
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    if: github.event_name != 'create' || (github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v'))
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            platform: linux
            artifact_name: CREXX-linux-x64
            cmake_args: ""
          - name: Windows x64
            os: windows-latest
            platform: windows
            artifact_name: CREXX-windows-x64
            cmake_args: "-DCREXX_FORCE_SYSTEM_OPENSSL=ON"
          - name: macOS arm64
            os: macos-latest
            platform: macos
            artifact_name: CREXX-macos-arm64
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=arm64"
          - name: macOS x86_64
            os: macos-15-intel
            platform: macos
            artifact_name: CREXX-macos-x86_64
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Update toolchain (MSYS2)
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            base-devel
            git
          pacboy: >-
            toolchain:p
            cmake:p
            ninja:p
            openssl:p
            pkgconf:p

      - name: Configure
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cmake -S . -G Ninja -B "${{ runner.temp }}/build" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            ${{ matrix.cmake_args }}

      - name: Configure
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cmake -S . -G Ninja -B "${{ runner.temp }}/build" \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            ${{ matrix.cmake_args }}

      - name: Build
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cmake --build "${{ runner.temp }}/build" --parallel 2

      - name: Build
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          cmake --build "${{ runner.temp }}/build" --parallel 2

      - name: CTest
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          ctest --test-dir "${{ runner.temp }}/build" \
            --output-on-failure \
            --no-tests=error \
            --parallel 1

      - name: CTest
        if: matrix.platform == 'windows'
        shell: msys2 {0}
        run: |
          ctest --test-dir "${{ runner.temp }}/build" \
            --output-on-failure \
            --no-tests=error \
            --parallel 1

      - name: Stage release payload
        if: github.event_name == 'create' && matrix.platform != 'windows'
        shell: bash
        run: |
          set -euo pipefail

          stage="${{ runner.temp }}/release-payload/${{ matrix.artifact_name }}"
          mkdir -p "$stage/bin" "$stage/examples"

          cp "${{ runner.temp }}/build/bin/"* "$stage/bin/"
          cp tests/demo/* "$stage/examples/"
          cp LICENSE README.md SECURITY.md INSTALL-RUN.md VERSION "$stage/"

      - name: Stage release payload
        if: github.event_name == 'create' && matrix.platform == 'windows'
        shell: pwsh
        run: |
          $stage = Join-Path "${{ runner.temp }}" "release-payload/${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force -Path (Join-Path $stage "bin") | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $stage "examples") | Out-Null

          Copy-Item -Path (Join-Path "${{ runner.temp }}" "build/bin/*") -Destination (Join-Path $stage "bin") -Recurse
          Copy-Item -Path "tests/demo/*" -Destination (Join-Path $stage "examples") -Recurse
          Copy-Item -Path "LICENSE", "README.md", "SECURITY.md", "INSTALL-RUN.md", "VERSION" -Destination $stage

      - name: Upload release payload
        if: github.event_name == 'create'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/release-payload/${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'create' && github.event.ref_type == 'tag' && startsWith(github.event.ref, 'v')
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download release payloads
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/release-payloads

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          payload_dir="${{ runner.temp }}/release-payloads"
          asset_dir="${{ runner.temp }}/release-assets"
          mkdir -p "$asset_dir"

          for dir in "$payload_dir"/CREXX-*; do
            [ -d "$dir" ] || continue
            payload="$(basename "$dir")"
            suffix="${payload#CREXX-}"
            asset="CREXX-${tag}-${suffix}.zip"
            (cd "$payload_dir" && zip -qr "$asset_dir/$asset" "$payload")
          done

          asset_count="$(find "$asset_dir" -name 'CREXX-*.zip' -type f | wc -l | tr -d ' ')"
          if [ "$asset_count" != "4" ]; then
            echo "Expected 4 release assets, found $asset_count" >&2
            exit 1
          fi

          ls -lh "$asset_dir"

      - name: Determine release metadata
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          echo "RELEASE_NAME=CREXX ${tag#v}" >> "$GITHUB_ENV"

          case "$tag" in
            *alpha*|*beta*|*rc*|*test*)
              echo "PRERELEASE=true" >> "$GITHUB_ENV"
              ;;
            *)
              echo "PRERELEASE=false" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ env.PRERELEASE }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ runner.temp }}/release-assets/*.zip
